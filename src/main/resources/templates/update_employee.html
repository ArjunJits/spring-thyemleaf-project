<!-- src/main/resources/templates/update_employee.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Update Employee</title>
    <meta charset="UTF-8"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
    <div class="container mt-5">
        <div class="card">
            <div class="card-header">
                <h2>Update Employee</h2>
            </div>
            <div class="card-body">
                <form th:action="@{/employee/saveEmployee}" th:object="${employee}" method="post">
                    <input type="hidden" th:field="*{id}"/>
                    <div class="mb-3">
                        <label for="firstName" class="form-label">First Name:</label>
                        <input type="text" id="firstName" th:field="*{firstName}" class="form-control" required/>
                    </div>
                    <div class="mb-3">
                        <label for="lastName" class="form-label">Last Name:</label>
                        <input type="text" id="lastName" th:field="*{lastName}" class="form-control" required/>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email:</label>
                        <input type="email" id="email" th:field="*{email}" class="form-control" required/>
                    </div>
                    <div>
                        <button type="submit" class="btn btn-primary">Update</button>
                        <a th:href="@{/employee/list}" class="btn btn-secondary ms-2">Back to Employee List</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
