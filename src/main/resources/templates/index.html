<!-- src/main/resources/templates/index.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee List</title>
    <meta charset="UTF-8"/>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <a th:href="@{/employee/showNewEmployeeForm}" class="btn btn-primary mb-3">Add New Employee</a>
    <h1 class="mb-4 text-center">Employee List</h1>
    <div class="table-responsive">
        <table class="table table-striped table-bordered align-middle">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Email</th>
                <th style="text-align:center"> Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="employee1 : ${listEmployees}">
                <td th:text="${employee1.id}"></td>
                <td th:text="${employee1.firstName}"></td>
                <td th:text="${employee1.lastName}"></td>
                <td th:text="${employee1.email}"></td>
                <td><a th:href="@{/employee/showFormUpdate/{id}(id=${employee1.id})}" class="btn btn-warning"
                       style="margin-left:150px">Update</a>
                    <a th:href="@{/employee/deleteEmployee/{id}(id=${employee1.id})}" class="btn btn-danger"
                       onclick="return confirm('Are you sure you want to delete this employee?');"
                       style="margin-left:50px">Delete</a>
                </td>

            </tr>
            </tbody>
        </table>
        <div th:if="${totalPages > 1}">
            <div class="row col-sm-10">
                <div class="col-sm-2">
                    Total Rows: [[${totalItems}]]
                </div>
                <div class="col-sm-1">
                    <span th:each="i: ${#numbers.sequence(1, totalPages)}">
      <a th:if="${currentPage != i}" th:href="@{'/employee/page/' + ${i}}">[[${i}]]</a>
      <span th:unless="${currentPage != i}">[[${i}]]</span> &nbsp; &nbsp;
                    </span>
                </div>
                <div class="col-sm-1">
                    <a th:if="${currentPage < totalPages}" th:href="@{'/employee/page/' + ${currentPage + 1}}">Next</a>
                    <span th:unless="${currentPage < totalPages}">Next</span>
                </div>

                <div class="col-sm-1">
                    <a th:if="${currentPage < totalPages}" th:href="@{'/employee/page/' + ${totalPages}}">Last</a>
                    <span th:unless="${currentPage < totalPages}">Last</span>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
