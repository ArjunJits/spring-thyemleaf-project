spring.application.name=Spring-Thyemleaf
spring.datasource.url=jdbc:mysql://database-1.c1y06eeqi5b0.ap-south-1.rds.amazonaws.com:3306/ClaimDB
# Database Credentials
spring.datasource.username=admin
spring.datasource.password=admin1234
# Driver Class Name
# Note: com.mysql.cj.jdbc.Driver is the modern class for mysql-connector-j
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# JPA / Hibernate Properties
# 'update' will create/modify tables automatically based on your Entity classes
spring.jpa.hibernate.ddl-auto=update
# Show SQL in console (very helpful for debugging your @Query methods)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Database Platform
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl